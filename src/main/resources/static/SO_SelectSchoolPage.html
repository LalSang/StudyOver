<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyOver</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="actions.js"></script>
  </head>
  <body>
    <main>
      <div class="login-container">
        <form id="school-select-form" class="login-form signup-form">
          <h2 class="school-select-title">StudyOver</h2>
          <p class="login-subtitle">Select your university to continue</p>
          <div class="school-search-wrapper">
            <input
              id="school-search"
              class="login-input school-search-input"
              placeholder="Type your university name"
              autocomplete="off"
              required
            />
            <div
              id="school-search-results"
              class="school-search-results"
              role="listbox"
              aria-label="University suggestions"
            ></div>
          </div>
          <button
            type="submit"
            class="login-button universal-hover poppins-font"
          >
            Continue
          </button>
          <p id="school-select-error" class="login-error" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <footer></footer>
  </body>
</html>
