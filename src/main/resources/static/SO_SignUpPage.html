<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="actions.js"></script>
  </head>
  <body>
    <header>
      <h1 id="school-signup-title">Create Your StudyOver Account</h1>
    </header>

    <main>
      <div class="login-container">
        <form
          id="signup-form"
          class="login-form signup-form"
          action="/signup"
          method="post"
        >
          <img
            id="school-signup-logo"
            src="images/AppStateLogo.png"
            alt="University logo"
            class="login-logo"
          />
          <select id="signup-school" name="school" class="login-input" required>
            <option value="" selected disabled>Select School / Organization</option>
            <option value="appstate">Appalachian State University</option>
            <option value="unc">University of North Carolina at Chapel Hill</option>
            <option value="ncsu">North Carolina State University</option>
            <option value="duke">Duke University</option>
            <option value="ecu">East Carolina University</option>
          </select>
          <input
            type="text"
            id="signup-first-name"
            name="firstName"
            placeholder="First Name"
            class="login-input"
            required
          />
          <input
            type="text"
            id="signup-last-name"
            name="lastName"
            placeholder="Last Name"
            class="login-input"
            required
          />
          <input
            type="email"
            id="signup-email"
            name="email"
            placeholder="School Email"
            class="login-input"
            required
          />
          <input
            type="password"
            id="signup-password"
            name="password"
            placeholder="Password"
            class="login-input"
            required
          />
          <input
            type="password"
            id="signup-confirm-password"
            name="confirmPassword"
            placeholder="Confirm Password"
            class="login-input"
            required
          />
          <select id="signup-status" name="status" class="login-input" required>
            <option value="" selected disabled>Status / School Year</option>
            <option value="freshman">Freshman</option>
            <option value="sophomore">Sophomore</option>
            <option value="junior">Junior</option>
            <option value="senior">Senior</option>
            <option value="graduate-student">Graduate Student</option>
            <option value="faculty-staff">Faculty / Staff</option>
          </select>
          <input
            type="number"
            id="signup-grad-year"
            name="gradYear"
            placeholder="Graduation Year"
            min="1950"
            max="2100"
            class="login-input"
            required
          />
          <input
            type="date"
            id="signup-birthday"
            name="birthday"
            class="login-input"
            required
          />
          <select id="signup-gender" name="gender" class="login-input" required>
            <option value="" selected disabled>Gender</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="non-binary">Non-binary</option>
            <option value="prefer-not-to-say">Prefer not to say</option>
          </select>
          <button
            type="submit"
            class="login-button universal-hover poppins-font"
          >
            Create Account
          </button>
          <button
            id="back-to-login-button"
            type="button"
            class="signup-button universal-hover poppins-font"
          >
            Back to Sign In
          </button>
          <button
            id="change-school-button-signup"
            type="button"
            class="signup-button universal-hover poppins-font"
          >
            Change School
          </button>
          <p id="signup-error" class="login-error" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <footer></footer>
  </body>
</html>
